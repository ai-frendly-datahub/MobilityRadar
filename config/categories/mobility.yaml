category_name: "mobility"
display_name: "혼잡/이동 레이더"

sources:
  # Public mobility API (high-volume)
  - name: "CityBikes Networks API"
    type: "citybikes"
    url: "https://api.citybik.es/v2/networks"
    limit: 120
    focus_cities: ["Seoul", "Tokyo", "New York", "London", "Paris"]

  # EV/mobility domain-specific feeds
  - name: "Electrek"
    type: "rss"
    url: "https://electrek.co/feed/"
  - name: "InsideEVs"
    type: "rss"
    url: "https://insideevs.com/feed/"
  - name: "Charged EVs"
    type: "rss"
    url: "https://chargedevs.com/feed/"
  - name: "The Driven"
    type: "rss"
    url: "https://thedriven.io/feed/"
  - name: "CleanTechnica Transportation"
    type: "rss"
    url: "https://cleantechnica.com/tag/transportation/feed/"
  - name: "CleanTechnica EV"
    type: "rss"
    url: "https://cleantechnica.com/tag/ev/feed/"
  - name: "Teslarati"
    type: "rss"
    url: "https://www.teslarati.com/feed/"
  - name: "Green Car Reports"
    type: "rss"
    url: "https://www.greencarreports.com/rss"
